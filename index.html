<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ARMY | Система отчетов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f0a 0%, #0d2e0d 50%, #0a2a0a 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        body.light {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
        }

        :root {
            --glass-bg: rgba(10, 25, 10, 0.92);
            --glass-border: rgba(76, 175, 80, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #c8e6c9;
            --text-muted: #8A9A8A;
            --accent: #4CAF50;
            --accent-glow: #81c784;
            --accent-dark: #2E7D32;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border-light: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
            --input-bg: rgba(5, 20, 5, 0.95);
            --card-hover: rgba(76, 175, 80, 0.15);
        }

        body.light {
            --glass-bg: rgba(245, 255, 245, 0.95);
            --glass-border: rgba(76, 175, 80, 0.3);
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --accent: #4CAF50;
            --accent-glow: #66BB6A;
            --accent-dark: #388E3C;
            --border-light: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.98);
            --card-hover: rgba(76, 175, 80, 0.1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 100px;
            margin-top: 10px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: white;
            box-shadow: var(--shadow-sm);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-glow), #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        body.light .logo h1 {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 100;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.4);
        }

        .page {
            display: none;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-top: 80px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .depts-grid {
            display: flex;
            justify-content: center;
            gap: 45px;
            flex-wrap: wrap;
            margin-top: 0;
        }

        .dept-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 38px 42px;
            width: 290px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .dept-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .dept-card:hover::before {
            left: 100%;
        }

        .dept-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        .dept-icon {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.25), rgba(46, 125, 50, 0.15));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 36px;
            color: var(--accent);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .dept-card:hover .dept-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .dept-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .dept-card p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .actions-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 45px;
        }

        .action-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 35px;
            width: 300px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .action-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .action-card:hover::before {
            left: 100%;
        }

        .action-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }

        .action-icon {
            width: 70px;
            height: 70px;
            background: rgba(76, 175, 80, 0.15);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 34px;
            color: var(--accent);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .action-card:hover .action-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .action-card h4 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .action-card p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 25px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .back-btn:hover {
            border-color: var(--accent);
            transform: translateX(-8px);
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.3);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(46, 125, 50, 0.08));
            padding: 18px 25px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body {
            padding: 25px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--accent-glow);
            margin-bottom: 8px;
        }

        .input-group label i {
            margin-right: 8px;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
            transform: scale(1.01);
        }

        .period-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .period-info {
            background: rgba(76, 175, 80, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            text-align: center;
            color: var(--accent-glow);
            font-size: 0.85rem;
            margin: 15px 0 20px;
        }

        .action-item {
            background: var(--card-hover);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid var(--border-light);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: actionAppear 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes actionAppear {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .action-item:hover {
            border-color: var(--accent);
            transform: translateX(6px);
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .action-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .remove-action {
            background: rgba(239, 68, 68, 0.15);
            border: none;
            color: #f87171;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
        }

        .remove-action:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }

        .action-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .action-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .action-field label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent-glow);
        }

        .action-field select, .action-field input {
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .action-field select:focus, .action-field input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .proofs-section {
            grid-column: span 2;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-light);
        }

        .proofs-section label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #ffffff !important;
            margin-bottom: 8px;
            display: block;
        }

        body.light .proofs-section label {
            color: #1f2937 !important;
        }

        .proof-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 8px 12px;
            animation: proofAppear 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes proofAppear {
            from {
                opacity: 0;
                transform: translateX(-15px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .proof-item input {
            flex: 1;
            padding: 10px 12px;
            font-size: 0.8rem;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-primary);
        }

        .remove-proof {
            background: rgba(239, 68, 68, 0.15);
            border: none;
            color: #f87171;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .remove-proof:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }

        .add-proof-btn {
            background: rgba(76, 175, 80, 0.18);
            border: 1px dashed var(--accent);
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 0.75rem;
            color: var(--accent);
            cursor: pointer;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .add-proof-btn:hover {
            background: rgba(76, 175, 80, 0.3);
            transform: translateY(-2px);
        }

        .points-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
        }

        .points-badge {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }

        .count-badge {
            background: rgba(76, 175, 80, 0.18);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--accent-glow);
        }

        .add-btn {
            width: 100%;
            background: rgba(76, 175, 80, 0.12);
            border: 2px dashed var(--accent);
            border-radius: 18px;
            padding: 14px;
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 16px 0;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .add-btn:hover {
            background: rgba(76, 175, 80, 0.25);
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            background: rgba(10, 25, 10, 0.5);
            border-radius: 20px;
        }

        .total-points-bar {
            background: rgba(76, 175, 80, 0.15);
            border-radius: 20px;
            padding: 15px 22px;
            margin: 20px 0 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .total-points-label {
            color: var(--text-primary);
            font-weight: 600;
        }

        .total-points-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.3s ease;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(105deg, var(--accent), var(--accent-dark));
            border: none;
            padding: 14px;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.5);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .footer-signature {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(46, 125, 50, 0.05));
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .footer-signature p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .footer-signature i {
            color: var(--accent);
            margin: 0 5px;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 0.85rem;
            animation: slideInRight 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            border-left: 4px solid #10b981;
            color: #10b981;
            display: flex;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.12);
            border-left: 4px solid #ef4444;
            color: #f87171;
            display: flex;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .submit-btn.loading {
            animation: pulse 1.5s ease infinite;
        }

        @media (max-width: 850px) {
            .depts-grid, .actions-grid {
                flex-direction: column;
                align-items: center;
            }
            .action-fields {
                grid-template-columns: 1fr;
            }
            .proofs-section {
                grid-column: span 1;
            }
            .period-row {
                grid-template-columns: 1fr;
            }
            .page {
                margin-top: 20px;
            }
            .card-header {
                flex-direction: column;
                text-align: center;
            }
            .header {
                margin-bottom: 60px;
            }
            .logo h1 {
                font-size: 2.2rem;
            }
            .logo-icon {
                width: 55px;
                height: 55px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeBtn">
        <i class="fas fa-sun"></i>
        <span>Светлая тема</span>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-gun"></i></div>
                <h1>ARMY</h1>
            </div>
            <p class="subtitle">Система подачи отчётов</p>
        </div>

        <div id="deptsPage" class="page">
            <div class="depts-grid">
                <div class="dept-card" data-dept="КМБ">
                    <div class="dept-icon"><i class="fas fa-shield-alt"></i></div>
                    <h3>КМБ</h3>
                    <p>Курс молодого бойца</p>
                </div>
                <div class="dept-card" data-dept="ACD">
                    <div class="dept-icon"><i class="fas fa-graduation-cap"></i></div>
                    <h3>ACD</h3>
                    <p>Академический отдел</p>
                </div>
                <div class="dept-card" data-dept="MA">
                    <div class="dept-icon"><i class="fas fa-user-graduate"></i></div>
                    <h3>MA</h3>

        function setDefaultDates() {
            const today = new Date();

            monday.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));

            sunday.setDate(monday.getDate() + 6);
            const start = document.getElementById('fStart');
            const end = document.getElementById('fEnd');
            if (start && end) {
                start.value = monday.toISOString().split('T')[0];
                end.value = sunday.toISOString().split('T')[0];
                updatePeriod();
            }
        }
        
        function updatePeriod() {
            const start = document.getElementById('fStart')?.value;
            const end = document.getElementById('fEnd')?.value;
            const info = document.getElementById('periodInfo');
            if (info && start && end) {
                const days = Math.ceil((new Date(end) - new Date(start)) / (86400000)) + 1;
                info.innerHTML = `📅 ${formatDate(start)} – ${formatDate(end)} (${days} дн.)`;
            }
        }

                                `).join('')}
                            </div>
                            <button class="add-proof-btn" data-action="${i}"><i class="fas fa-plus"></i> Добавить</button>
                        </div>
                    </div>
                    <div class="points-row">
                        <span class="count-badge"><i class="fas fa-hashtag"></i> Кол-во: ${a.count || 1}</span>
                        <span class="points-badge"><i class="fas fa-star"></i> Баллы: ${calcPoints(a)}</span>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.remove-action').forEach(btn => {
                btn.onclick = () => { currentActions.splice(parseInt(btn.dataset.idx), 1); renderActionsList(); updateTotalDisplay(); };
            });
            document.querySelectorAll('.action-type').forEach(sel => {
                sel.onchange = () => {
                    const idx = parseInt(sel.dataset.idx);
                    currentActions[idx].type = sel.value;
                    currentActions[idx].points = parseInt(sel.options[sel.selectedIndex].dataset.points) || 0;
                    updateActionDisplay(idx);
                    updateTotalDisplay();
                };
            });
            document.querySelectorAll('.action-count').forEach(inp => {
                inp.oninput = () => {
                    const idx = parseInt(inp.dataset.idx);
                    currentActions[idx].count = Math.max(1, parseInt(inp.value) || 1);
                    updateActionDisplay(idx);
                    updateTotalDisplay();
                };
            });
            document.querySelectorAll('.add-proof-btn').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.action);
                    if (!currentActions[idx].proofs) currentActions[idx].proofs = [''];
                    currentActions[idx].proofs.push('');
                    renderActionsList();
                };
            });
            document.querySelectorAll('.proof-input').forEach(inp => {
                inp.onchange = () => {
                    const ai = parseInt(inp.dataset.action);
                    const pi = parseInt(inp.dataset.proof);
                    if (currentActions[ai]?.proofs) currentActions[ai].proofs[pi] = inp.value;
                };
            });
            document.querySelectorAll('.remove-proof').forEach(btn => {
                btn.onclick = () => {
                    const ai = parseInt(btn.dataset.action);
                    const pi = parseInt(btn.dataset.proof);
                    if (currentActions[ai]?.proofs?.length > 1) {
                        currentActions[ai].proofs.splice(pi, 1);
                        renderActionsList();
                    }
                };
            });
        }
        
        function updateActionDisplay(idx) {
            const items = document.querySelectorAll('.action-item');
            if (items[idx]) {
                const countSpan = items[idx].querySelector('.count-badge');
                const pointsSpan = items[idx].querySelector('.points-badge');
                if (countSpan) countSpan.innerHTML = `<i class="fas fa-hashtag"></i> Кол-во: ${currentActions[idx].count || 1}`;
                if (pointsSpan) pointsSpan.innerHTML = `<i class="fas fa-star"></i> Баллы: ${calcPoints(currentActions[idx])}`;
            }
        }
        
        function updateTotalDisplay() {
            const span = document.getElementById('totalPoints');
            if (span) span.textContent = totalPoints();
        }
        
        function addAction() {
            currentActions.push({ type: '', points: 0, count: 1, proofs: [''] });
            renderActionsList();
            updateTotalDisplay();
        }
        
        async function submitForm() {
            const alertId = 'formAlert';
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ОТПРАВКА...';
            btn.classList.add('loading');
            
            if (currentAction === 'weekly') {
                const nick = document.getElementById('fNickname')?.value.trim();
                if (!nick) { showAlert(alertId, 'Введите никнейм', 'error'); resetButton(); return; }
                const rank = document.getElementById('fRank')?.value || '';
                const start = document.getElementById('fStart')?.value || '';
                const end = document.getElementById('fEnd')?.value || '';
                let acts = '', total = 0;
                currentActions.forEach((a,i) => {
                    const pts = calcPoints(a);
                    total += pts;
                    acts += `${i+1}. ${a.type || 'Не выбран'} x${a.count||1} = ${pts} баллов\n`;
                    if (a.proofs?.length) acts += `Доказательства: ${a.proofs.filter(p=>p).join(', ')}\n`;
                });
                
                try {
                    const weeklyEmbed = {
                        title: "📊 Еженедельный отчёт (MA)",
                        color: 0x4CAF50,
                        fields: [
                            { name: "👤 Никнейм", value: nick, inline: true },
                            { name: "🏅 Ранг", value: rank, inline: true },
                            { name: "📅 Период", value: `${formatDate(start)} - ${formatDate(end)}`, inline: true },
                            { name: "📝 Действия", value: acts.substring(0, 1024) || "Нет" },
                            { name: "⭐ Баллы", value: `${total}`, inline: true }
                        ],
                        footer: { text: "ARMY" },
                        timestamp: new Date().toISOString()
                    };
                    await sendDiscordEmbed(WEBHOOKS.MA.weekly, weeklyEmbed, ROLES_TO_TAG_WEEKLY);
                    showAlert(alertId, 'Отчёт отправлен!', 'success');
                    resetForm();
                } catch(e) {
                    showAlert(alertId, 'Ошибка отправки: ' + e.message, 'error');
                }
                
            } else if (currentAction === 'promotion') {
                const nick = document.getElementById('fNickname')?.value.trim();
                if (!nick) { showAlert(alertId, 'Введите никнейм', 'error'); resetButton(); return; }
                const curRank = document.getElementById('fCurrentRank')?.value || '';
                const desRank = document.getElementById('fDesiredRank')?.value || '';
                const lastProm = document.getElementById('fLastProm')?.value || '';
                let acts = '';
                let total = 0;
                currentActions.forEach((a,i) => {
                    const pts = calcPoints(a);
                    if (currentDept === 'MA') total += pts;
                    acts += `${i+1}. ${a.type || 'Не выбран'} x${a.count||1}`;
                    if (currentDept === 'MA') acts += ` = ${pts} баллов`;
                    acts += `\n`;
                    if (a.proofs?.length) acts += `Доказательства: ${a.proofs.filter(p=>p).join(', ')}\n`;
                });
                
                try {
                    const fields = [
                        { name: "👤 Никнейм", value: nick, inline: true },
                        { name: "🏅 Текущий ранг", value: curRank, inline: true },
                        { name: "🎯 Желаемый ранг", value: desRank, inline: true },
                        { name: "📅 Последнее повышение", value: formatDate(lastProm) || "Не указано", inline: true },
                        { name: "📝 Достижения", value: acts.substring(0, 1024) || "Нет" }
                    ];
                    if (currentDept === 'MA') {
                        fields.push({ name: "⭐ Баллы", value: `${total}`, inline: true });
                    }
                    
                    const promotionEmbed = {
                        title: `⬆️ Запрос на повышение (${currentDept})`,
                        color: 0x4CAF50,
                        fields: fields,
                        footer: { text: "ARMY" },
                        timestamp: new Date().toISOString()
                    };
                    const webhook = WEBHOOKS[currentDept]?.promotion;
                    if (webhook) await sendDiscordEmbed(webhook, promotionEmbed, ROLES_TO_TAG_PROMOTION);
                    showAlert(alertId, 'Запрос отправлен!', 'success');
                    resetForm();
                } catch(e) {
                    showAlert(alertId, 'Ошибка отправки: ' + e.message, 'error');
                }
                
            } else if (currentAction === 'exam') {
                const fullName = document.getElementById('fFullName')?.value.trim();
                if (!fullName) { showAlert(alertId, 'Введите имя и фамилию', 'error'); resetButton(); return; }
                const examType = document.getElementById('fExamType')?.value || '';
                let discordId = document.getElementById('fDiscord')?.value.trim() || '';
                const time = document.getElementById('fTime')?.value.trim() || '';
                
                const discordMention = discordId && discordId.match(/^\d+$/) ? `<@${discordId}>` : '';
                const roleTag = ROLE_TAGS[currentDept];
                
                try {
                    const examEmbed = {
                        title: `📝 Запись на экзамен (${currentDept})`,
                        color: 0x4CAF50,
                        fields: [
                            { name: "👤 Имя", value: fullName, inline: true },
                            { name: "🎓 Экзамен", value: examType, inline: true },
                            { name: "💬 Discord", value: discordMention || discordId || "Не указан", inline: true },
                            { name: "⏰ Время", value: time || "Не указано", inline: true }
                        ],
                        footer: { text: "ARMY" },
                        timestamp: new Date().toISOString()
                    };
                    
                    const webhook = WEBHOOKS[currentDept]?.exam;
                    const additionalWebhook = WEBHOOKS[currentDept]?.examAdditional;
                    
                    if (webhook) {
                        await sendDiscordEmbed(webhook, examEmbed, roleTag);
                    }
                    if (additionalWebhook && currentDept !== 'MA') {
                        await sendDiscordEmbed(additionalWebhook, examEmbed);
                    }
                    showAlert(alertId, 'Заявка отправлена!', 'success');
                    resetForm();
                } catch(e) {
                    showAlert(alertId, 'Ошибка отправки: ' + e.message, 'error');
                }
                
            } else if (currentAction === 'examResult') {
                const examiner = document.getElementById('rExaminer')?.value.trim();
                const student = document.getElementById('rStudent')?.value.trim();
                const department = document.getElementById('rDepartment')?.value;
                const result = document.getElementById('rResult')?.value;
                const score = document.getElementById('rScore')?.value;
                
                if (!examiner) { showAlert(alertId, 'Введите имя принимавшего', 'error'); resetButton(); return; }
                if (!student) { showAlert(alertId, 'Введите имя сдающего', 'error'); resetButton(); return; }
                if (!score) { showAlert(alertId, 'Введите количество баллов', 'error'); resetButton(); return; }
                
                try {
                    const resultEmbed = {
                        title: `📋 Результат экзамена (${department})`,
                        color: result === 'Сдал' ? 0x10b981 : 0xef4444,
                        fields: [
                            { name: "👤 Принимавший", value: examiner, inline: true },
                            { name: "👤 Сдающий", value: student, inline: true },
                            { name: "📊 Результат", value: result, inline: true },
                            { name: "⭐ Баллы", value: score, inline: true }
                        ],
                        footer: { text: "ARMY" },
                        timestamp: new Date().toISOString()
                    };
                    
                    const webhook = EXAM_RESULT_WEBHOOKS[department];
                    if (webhook) {
                        await sendDiscordEmbed(webhook, resultEmbed);
                    }
                    showAlert(alertId, 'Результат отправлен!', 'success');
                    resetForm();
                } catch(e) {
                    showAlert(alertId, 'Ошибка отправки: ' + e.message, 'error');
                }
            }
            
            function resetButton() {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                btn.classList.remove('loading');
            }
            resetButton();
        }
        
        function resetForm() {
            currentActions = [];
            renderActionsList();
            updateTotalDisplay();
            if (currentAction === 'weekly') {
                document.getElementById('fNickname') && (document.getElementById('fNickname').value = '');
                document.getElementById('fRank') && (document.getElementById('fRank').value = '');
                setDefaultDates();
            } else if (currentAction === 'promotion') {
                document.getElementById('fNickname') && (document.getElementById('fNickname').value = '');
                document.getElementById('fCurrentRank') && (document.getElementById('fCurrentRank').value = '');
                document.getElementById('fDesiredRank') && (document.getElementById('fDesiredRank').value = '');
                document.getElementById('fLastProm') && (document.getElementById('fLastProm').value = '');
            } else if (currentAction === 'exam') {
                document.getElementById('fFullName') && (document.getElementById('fFullName').value = '');
                document.getElementById('fExamType') && (document.getElementById('fExamType').value = '');
                document.getElementById('fDiscord') && (document.getElementById('fDiscord').value = '');
                document.getElementById('fTime') && (document.getElementById('fTime').value = '');
            } else if (currentAction === 'examResult') {
                document.getElementById('rExaminer') && (document.getElementById('rExaminer').value = '');
                document.getElementById('rStudent') && (document.getElementById('rStudent').value = '');
                document.getElementById('rDepartment') && (document.getElementById('rDepartment').value = 'ACD');
                document.getElementById('rResult') && (document.getElementById('rResult').value = 'Сдал');
                document.getElementById('rScore') && (document.getElementById('rScore').value = '');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light');
                document.querySelector('#themeBtn i').className = 'fas fa-moon';
                document.querySelector('#themeBtn span').innerText = 'Тёмная тема';
            }
            document.getElementById('themeBtn').onclick = () => {
                document.body.classList.toggle('light');
                const isLight = document.body.classList.contains('light');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                const icon = document.querySelector('#themeBtn i');
                const span = document.querySelector('#themeBtn span');
                if (isLight) { icon.className = 'fas fa-moon'; span.innerText = 'Тёмная тема'; }
                else { icon.className = 'fas fa-sun'; span.innerText = 'Светлая тема'; }
            };
            
            document.querySelectorAll('.dept-card').forEach(card => {
                card.onclick = () => showActionsPage(card.dataset.dept);
            });
            document.getElementById('backToDeptsBtn').onclick = showDeptsPage;
            document.getElementById('backToActionsBtn').onclick = () => showActionsPage(currentDept);
            document.getElementById('addActionBtn').onclick = addAction;
            document.getElementById('submitBtn').onclick = submitForm;
            
            showDeptsPage();
        });
    </script>
</body>
</html>
